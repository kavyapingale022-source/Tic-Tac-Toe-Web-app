<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Tic-Tac-Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1115;
      --card-bg: rgba(25, 27, 33, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #00e5ff;
      --secondary: #d946ef;
      --x-color: #00e5ff;
      --o-color: #d946ef;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2vh 16px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(217, 70, 239, 0.08), transparent 25%);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      margin-bottom: 24px;
      margin-top: 2vh;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px 0;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 99px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .status-badge span {
      font-weight: 700;
    }

    .setup {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .board {
      width: 100%;
      aspect-ratio: 1/1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .cell {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Sora', sans-serif;
      font-size: clamp(40px, 12vw, 64px);
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }

    .cell:hover:not(.disabled) {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }

    .cell.x {
      color: var(--x-color);
      text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cell.o {
      color: var(--o-color);
      text-shadow: 0 0 15px rgba(217, 70, 239, 0.4);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .cell.disabled { pointer-events: none; }

    .score-panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .score-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .score-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .score-value {
      font-size: 20px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
    }

    .score-box:nth-child(1) .score-value { color: var(--x-color); }
    .score-box:nth-child(2) .score-value { color: var(--text); }
    .score-box:nth-child(3) .score-value { color: var(--o-color); }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    button, .toggle {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    button:hover, .toggle:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(217,70,239,0.2));
      border-color: rgba(255,255,255,0.15);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(0,229,255,0.3), rgba(217,70,239,0.3));
    }

    .toggle input { display: none; }
    
    .toggle.active {
      background: rgba(217,70,239,0.15);
      border-color: rgba(217,70,239,0.4);
      color: #fff;
    }

    .made-by {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .app { padding: 24px 16px; border-radius: 20px; }
      .cell { border-radius: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Tic-Tac-Toe</h1>
      <div class="status-badge" id="statusBadge">Turn: <span id="turnDisplay" style="color: var(--x-color);">X</span></div>
    </div>

    <div class="setup">
      <input id="p1" placeholder="Player X" value="Player 1">
      <input id="p2" placeholder="Player O" value="Player 2">
    </div>

    <div class="board" id="board"></div>

    <div class="score-panel">
      <div class="score-box">
        <div class="score-label">X Wins</div>
        <div class="score-value" id="xWins">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Draws</div>
        <div class="score-value" id="draws">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">O Wins</div>
        <div class="score-value" id="oWins">0</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="newGame">Restart Game</button>
      <button id="resetScore">Reset Score</button>
      <label class="toggle" id="aiLabel"><input type="checkbox" id="ai"> Play vs AI</label>
    </div>

    <div class="made-by">Made with 💙 by Kavya</div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusBadge = document.getElementById('statusBadge');
    const turnDisplay = document.getElementById('turnDisplay');
    const p1El = document.getElementById('p1');
    const p2El = document.getElementById('p2');
    const aiEl = document.getElementById('ai');
    const aiLabelEl = document.getElementById('aiLabel');
    const xWinsEl = document.getElementById('xWins');
    const oWinsEl = document.getElementById('oWins');
    const drawsEl = document.getElementById('draws');
    const newGameBtn = document.getElementById('newGame');
    const resetScoreBtn = document.getElementById('resetScore');

    let board = Array(9).fill('');
    let current = 'X';
    let running = true;
    let score = { X: 0, O: 0, D: 0 };

    const lines = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function nameOf(sym) {
      return sym === 'X' ? (p1El.value.trim() || 'Player 1') : (p2El.value.trim() || 'Player 2');
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` disabled ${val.toLowerCase()}` : '');
        cell.textContent = val;
        cell.dataset.i = i;
        cell.onclick = onCellClick;
        boardEl.appendChild(cell);
      });
      
      if (running) {
        statusBadge.innerHTML = `Turn: <span style="color: var(--${current.toLowerCase()}-color);">${nameOf(current)}</span>`;
      }
      
      xWinsEl.textContent = score.X;
      oWinsEl.textContent = score.O;
      drawsEl.textContent = score.D;
    }

    function onCellClick(e) {
      const i = +e.currentTarget.dataset.i;
      if (!running || board[i]) return;
      play(i, current);
      if (running && aiEl.checked && current === 'O') setTimeout(aiMove, 400);
    }

    function play(i, sym) {
      board[i] = sym;
      const result = getResult();
      if (result) {
        running = false;
        if (result === 'D') {
          score.D++;
          statusBadge.innerHTML = `<span>It's a Draw!</span>`;
        } else {
          score[result]++;
          statusBadge.innerHTML = `<span style="color: var(--${result.toLowerCase()}-color);">${nameOf(result)} Wins! 🎉</span>`;
        }
      } else {
        current = current === 'X' ? 'O' : 'X';
      }
      render();
    }

    function getResult() {
      for (const [a,b,c] of lines) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
      }
      if (board.every(Boolean)) return 'D';
      return null;
    }

    function aiMove() {
      const free = board.map((v,i) => v ? null : i).filter(v => v !== null);
      for (const i of free) {
        const copy = board.slice(); copy[i] = 'O';
        if (isWin(copy, 'O')) return play(i, 'O');
      }
      for (const i of free) {
        const copy = board.slice(); copy[i] = 'X';
        if (isWin(copy, 'X')) return play(i, 'O');
      }
      if (free.includes(4)) return play(4, 'O');
      const pick = free[Math.floor(Math.random() * free.length)];
      if (pick !== undefined) play(pick, 'O');
    }

    function isWin(b, s) {
      return lines.some(([a,b1,c]) => b[a] === s && b[b1] === s && b[c] === s);
    }

    function resetBoard() {
      board = Array(9).fill('');
      current = 'X';
      running = true;
      render();
    }

    newGameBtn.onclick = resetBoard;
    
    aiEl.onchange = () => {
      if (aiEl.checked) {
        p2El.value = 'AI';
        aiLabelEl.classList.add('active');
      } else {
        if (p2El.value === 'AI') p2El.value = 'Player 2';
        aiLabelEl.classList.remove('active');
      }
      resetBoard();
    };
    
    resetScoreBtn.onclick = () => {
      score = { X: 0, O: 0, D: 0 };
      resetBoard();
    };

    render();
  </script>
</body>
</html>
